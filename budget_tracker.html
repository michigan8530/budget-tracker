<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il mio Budget</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .auth-card { background: #fff; border: 0.5px solid #dddcd4; border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 380px; }
  .auth-card h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .auth-card p { font-size: 13px; color: #888780; margin-bottom: 24px; }
  .auth-tabs { display: flex; margin-bottom: 24px; border: 0.5px solid #dddcd4; border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 8px; font-size: 13px; background: transparent; border: none; cursor: pointer; color: #888780; }
  .auth-tab.active { background: #1a1a18; color: #fff; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; color: #888780; }
  .field input { border: 0.5px solid #c5c4bb; border-radius: 8px; padding: 10px 12px; font-size: 14px; background: #f5f4f0; color: #1a1a18; outline: none; }
  .field input:focus { border-color: #1a1a18; }
  .auth-btn { width: 100%; padding: 10px; background: #1a1a18; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 4px; }
  .auth-btn:hover { background: #333; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-msg { font-size: 12px; margin-top: 10px; min-height: 16px; }
  .auth-msg.err { color: #A32D2D; }
  .auth-msg.ok { color: #3B6D11; }

  #app-screen { display: none; padding: 24px 16px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .topbar h1 { font-size: 18px; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-email { font-size: 12px; color: #888780; }
  .logout-btn { background: transparent; border: 0.5px solid #c5c4bb; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .logout-btn:hover { background: #f5f4f0; }

  .top-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .card { background: #fff; border: 0.5px solid #dddcd4; border-radius: 12px; padding: 14px 16px; }
  .card .label { font-size: 12px; color: #888780; margin-bottom: 6px; }
  .card .value { font-size: 22px; font-weight: 500; }
  .card .sub { font-size: 11px; color: #b4b2a9; margin-top: 3px; }
  .card.green { background: #eaf3de; }
  .card.green .label, .card.green .value { color: #3B6D11; }
  .card.amber { background: #faeeda; }
  .card.amber .label, .card.amber .value { color: #854F0B; }
  .card.red { background: #fcebeb; }
  .card.red .label, .card.red .value { color: #A32D2D; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .panel { background: #fff; border: 0.5px solid #dddcd4; border-radius: 12px; padding: 16px; }
  .panel h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .form-col { display: flex; flex-direction: column; gap: 8px; }
  .form-col input, .form-col select { font-size: 14px; border: 0.5px solid #c5c4bb; border-radius: 8px; padding: 8px 10px; background: #f5f4f0; color: #1a1a18; width: 100%; outline: none; }
  .btn { background: transparent; border: 0.5px solid #c5c4bb; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #1a1a18; cursor: pointer; width: 100%; margin-top: 4px; }
  .btn:hover { background: #f5f4f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .exp-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
  .exp-item { display: flex; justify-content: space-between; align-items: center; background: #f5f4f0; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  .exp-left { display: flex; align-items: center; gap: 8px; }
  .exp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .exp-name { color: #1a1a18; }
  .exp-cat { font-size: 11px; color: #b4b2a9; }
  .exp-right { display: flex; align-items: center; gap: 8px; }
  .exp-amount { font-weight: 500; }
  .del-btn { background: none; border: none; color: #b4b2a9; cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; }
  .del-btn:hover { color: #A32D2D; }
  .divider { border-top: 0.5px solid #dddcd4; padding-top: 10px; margin-top: 10px; display: flex; justify-content: space-between; font-size: 13px; }
  .empty { text-align: center; color: #b4b2a9; font-size: 13px; padding: 20px 0; }

  .summary-panel { background: #fff; border: 0.5px solid #dddcd4; border-radius: 12px; padding: 16px; }
  .summary-panel h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .summary-inner { display: flex; gap: 20px; align-items: center; }
  .donut-wrap { width: 150px; height: 150px; flex-shrink: 0; position: relative; }
  .legend { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .leg-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .leg-left { display: flex; align-items: center; gap: 6px; color: #888780; }
  .leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .bar-bg { background: #e8e7e2; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 8px; }
  .bar-fill { height: 8px; border-radius: 4px; transition: width 0.4s; }
  .goal-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #888780; }
  .goal-row input { width: 90px; border: 0.5px solid #c5c4bb; border-radius: 6px; padding: 4px 8px; font-size: 13px; background: #f5f4f0; color: #1a1a18; }
  .legend-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; font-size: 12px; color: #888780; }
  .ltag { display: flex; align-items: center; gap: 4px; }
  .ltag-dot { width: 8px; height: 8px; border-radius: 50%; }

  @media (max-width: 600px) {
    .top-cards { grid-template-columns: repeat(2, 1fr); }
    .panels { grid-template-columns: 1fr; }
    .summary-inner { flex-direction: column; }
    .donut-wrap { width: 100%; height: 180px; }
  }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h2>Il mio Budget</h2>
    <p>Accedi per gestire le tue spese</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Accedi</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrati</button>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="nome@email.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" />
    </div>
    <button class="auth-btn" onclick="doAuth()" id="auth-btn">Accedi</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <h1>Il mio Budget — <span id="month-label"></span></h1>
    <div class="topbar-right">
      <span class="user-email" id="user-email-label"></span>
      <button class="logout-btn" onclick="logout()">Esci</button>
    </div>
  </div>
  <div class="top-cards" id="cards"></div>
  <div class="panels">
    <div class="panel">
      <h3>Aggiungi spesa</h3>
      <div class="form-col">
        <input type="text" id="inp-name" placeholder="Descrizione (es. scarpe, cena...)" />
        <input type="number" id="inp-amount" placeholder="Importo (€)" step="0.01" min="0.01" />
        <select id="inp-cat">
          <option value="svago">Svago</option>
          <option value="vestiario">Vestiario</option>
          <option value="cura">Cura personale</option>
          <option value="tecnologia">Tecnologia</option>
          <option value="altro" selected>Altro</option>
        </select>
        <button class="btn" onclick="addExpense()" id="add-btn">+ Aggiungi spesa</button>
      </div>
      <div style="margin-top:14px;">
        <div style="font-size:13px;color:#888780;margin-bottom:6px;">Obiettivo risparmio</div>
        <div class="bar-bg"><div class="bar-fill" id="goalBar" style="background:#1D9E75;width:0%"></div></div>
        <div class="goal-row">
          Obiettivo: €<input type="number" id="goalInput" value="800" min="0" max="1200" step="50" oninput="savingsGoal=parseFloat(this.value)||0;render();" />
        </div>
      </div>
      <div class="legend-tags">
        <span class="ltag"><span class="ltag-dot" style="background:#1D9E75"></span>svago</span>
        <span class="ltag"><span class="ltag-dot" style="background:#3266ad"></span>vestiario</span>
        <span class="ltag"><span class="ltag-dot" style="background:#D85A30"></span>cura</span>
        <span class="ltag"><span class="ltag-dot" style="background:#7F77DD"></span>tecnologia</span>
        <span class="ltag"><span class="ltag-dot" style="background:#888780"></span>altro</span>
      </div>
    </div>
    <div class="panel">
      <h3>Spese del mese</h3>
      <div class="exp-list" id="expList"><div class="empty">Caricamento...</div></div>
      <div class="divider">
        <span style="color:#888780;">Totale speso</span>
        <span style="font-weight:500;" id="totalLabel">€0,00</span>
      </div>
    </div>
  </div>
  <div class="summary-panel">
    <h3>Riepilogo mensile</h3>
    <div class="summary-inner">
      <div class="donut-wrap"><canvas id="donut" role="img" aria-label="Distribuzione budget mensile"></canvas></div>
      <div class="legend" id="summaryLegend"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SUPABASE_URL = 'https://qcbxcchkhujmbfgkfvip.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjYnhjY2hraHVqbWJmZ2tmdmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY2NzMsImV4cCI6MjA5MTgyMjY3M30.k2qgkrMjv_6sBgfNYHFrsWMx3tL9yBi9pnS1a6RhXlM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const INCOME = 1800, FIXED = 600, DISPOSABLE = INCOME - FIXED;
const CATS = { svago:'#1D9E75', vestiario:'#3266ad', cura:'#D85A30', tecnologia:'#7F77DD', altro:'#888780' };
let expenses = [], savingsGoal = 800, donutChart = null, currentUser = null;

function fmt(n){ return '€' + n.toFixed(2).replace('.', ','); }
function totalSpent(){ return expenses.reduce((s,e)=>s+e.amount,0); }
function remaining(){ return DISPOSABLE - totalSpent(); }
function canSpend(){ return Math.max(0, remaining() - savingsGoal); }
function goalPct(){ return Math.min(100, (Math.max(0, remaining()) / savingsGoal) * 100); }
function cardClass(v){ return v > 150 ? 'green' : v > 50 ? 'amber' : 'red'; }
function monthLabel(){ return new Date().toLocaleDateString('it-IT',{month:'long',year:'numeric'}); }

let currentTab = 'login';
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('auth-btn').textContent = tab === 'login' ? 'Accedi' : 'Registrati';
  document.getElementById('auth-msg').textContent = '';
  document.getElementById('auth-msg').className = 'auth-msg';
}

async function doAuth(){
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  const msg = document.getElementById('auth-msg');
  if(!email||!password){ msg.className='auth-msg err'; msg.textContent='Inserisci email e password.'; return; }
  btn.disabled=true; btn.textContent='...';
  const fn = currentTab==='login' ? sb.auth.signInWithPassword.bind(sb.auth) : sb.auth.signUp.bind(sb.auth);
  const { data, error } = await fn({ email, password });
  btn.disabled=false; btn.textContent = currentTab==='login'?'Accedi':'Registrati';
  if(error){ msg.className='auth-msg err'; msg.textContent=error.message; }
  else if(currentTab==='register'&&!data.session){ msg.className='auth-msg ok'; msg.textContent='Controlla la tua email per confermare la registrazione.'; }
}

async function logout(){
  await sb.auth.signOut();
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  currentUser=null; expenses=[];
}

sb.auth.onAuthStateChange(async (event, session) => {
  if(session){
    currentUser=session.user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('user-email-label').textContent=currentUser.email;
    document.getElementById('month-label').textContent=monthLabel();
    await loadExpenses();
  }
});

async function loadExpenses(){
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth(),1).toISOString();
  const to=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59).toISOString();
  const {data,error}=await sb.from('expenses').select('*').eq('user_id',currentUser.id).gte('created_at',from).lte('created_at',to).order('created_at',{ascending:false});
  if(!error) expenses=data||[];
  render();
}

async function addExpense(){
  const name=document.getElementById('inp-name').value.trim();
  const amount=parseFloat(document.getElementById('inp-amount').value);
  const cat=document.getElementById('inp-cat').value;
  if(!name||isNaN(amount)||amount<=0) return;
  const btn=document.getElementById('add-btn');
  btn.disabled=true;
  const {data,error}=await sb.from('expenses').insert([{user_id:currentUser.id,name,amount,cat}]).select();
  btn.disabled=false;
  if(!error&&data){ expenses.unshift(data[0]); document.getElementById('inp-name').value=''; document.getElementById('inp-amount').value=''; render(); }
}

async function removeExpense(id){
  await sb.from('expenses').delete().eq('id',id);
  expenses=expenses.filter(e=>e.id!==id);
  render();
}

function render(){
  const spent=totalSpent(), rem=remaining(), saved=Math.max(0,rem), cs=canSpend();
  document.getElementById('cards').innerHTML=`
    <div class="card"><div class="label">Stipendio</div><div class="value">${fmt(INCOME)}</div><div class="sub">mensile netto</div></div>
    <div class="card"><div class="label">Costo fisso</div><div class="value">${fmt(FIXED)}</div><div class="sub">affitto + bollette</div></div>
    <div class="card amber"><div class="label">Speso</div><div class="value">${fmt(spent)}</div><div class="sub">su ${fmt(DISPOSABLE)} disponibili</div></div>
    <div class="card green"><div class="label">Risparmio obiettivo</div><div class="value">${fmt(savingsGoal)}</div><div class="sub">da mettere da parte</div></div>
    <div class="card ${cardClass(cs)}" style="grid-column:1/-1;">
      <div class="label" style="font-size:13px;">Puoi ancora spendere per te (shopping, svago...)</div>
      <div class="value" style="font-size:28px;">${fmt(cs)}</div>
      <div class="sub">dopo questi hai messo da parte ${fmt(savingsGoal)}</div>
    </div>`;

  document.getElementById('expList').innerHTML=expenses.length===0
    ?'<div class="empty">Nessuna spesa questo mese</div>'
    :expenses.map(e=>`<div class="exp-item">
        <div class="exp-left"><div class="exp-dot" style="background:${CATS[e.cat]||'#888'}"></div>
        <div><div class="exp-name">${e.name}</div><div class="exp-cat">${e.cat}</div></div></div>
        <div class="exp-right"><span class="exp-amount">${fmt(e.amount)}</span>
        <button class="del-btn" onclick="removeExpense('${e.id}')">×</button></div>
      </div>`).join('');

  document.getElementById('totalLabel').textContent=fmt(spent);
  document.getElementById('goalBar').style.width=goalPct()+'%';

  document.getElementById('summaryLegend').innerHTML=
    [['Fisso (affitto+bollette)',fmt(FIXED),'#888780'],['Speso questo mese',fmt(spent),'#E24B4A'],['Risparmio stimato',fmt(saved),'#1D9E75']]
    .map(([l,v,c])=>`<div class="leg-row"><span class="leg-left"><span class="leg-sq" style="background:${c}"></span>${l}</span><span style="font-weight:500;">${v}</span></div>`).join('')+
    `<div style="border-top:0.5px solid #dddcd4;padding-top:8px;margin-top:4px;display:flex;justify-content:space-between;font-size:13px;"><span style="color:#888780;">Totale</span><span style="font-weight:500;">${fmt(INCOME)}</span></div>`;

  if(donutChart) donutChart.destroy();
  donutChart=new Chart(document.getElementById('donut'),{
    type:'doughnut',
    data:{labels:['Fisso','Speso','Risparmio'],datasets:[{data:[FIXED,spent,saved],backgroundColor:['#888780','#E24B4A','#1D9E75'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}}}
  });
}
</script>
</body>
</html>
